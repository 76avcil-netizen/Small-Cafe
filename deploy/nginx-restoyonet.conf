server {
  listen 80;
  server_name your-domain.example;

  root /var/www/restoyonet;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
